x-automerge-pipeline: &automerge-pipeline
  ifModify:
    - "bucket/**"
    - "bin/**"
    - ".cnb.yml"
    - ".cnb/**"
  stages:
    - name: 等待 PR 轻量检查通过
      type: cnb:await
      options:
        key: pr-check-ready
    - name: automerge
      type: git:auto-merge
      options:
        mergeType: squash
        removeSourceBranch: true

main:
  pull_request.mergeable:
    - <<: *automerge-pipeline
