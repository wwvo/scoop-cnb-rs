name: Validate Scoop Hash And Install

on:
  pull_request:
    paths:
      - "bucket/**"
  push:
    branches:
      - main
    paths:
      - "bucket/**"
  workflow_dispatch:

concurrency:
  group: validate-hash-install-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate manifest URLs and hashes
        shell: pwsh
        run: python bin/check.py

      - name: Install Scoop and verify packages
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          $installer = Join-Path $env:USERPROFILE "install.ps1"
          Invoke-WebRequest "https://raw.githubusercontent.com/ScoopInstaller/Install/master/install.ps1" -UseBasicParsing -OutFile $installer
          & $installer -RunAsAdmin
          scoop --version

          $localBucketRoot = Join-Path $env:USERPROFILE "scoop\buckets\local-bucket"
          if (Test-Path $localBucketRoot) {
            Remove-Item -Recurse -Force $localBucketRoot
          }
          New-Item -ItemType Directory -Force -Path $localBucketRoot | Out-Null
          Copy-Item -Recurse -Force (Join-Path $PWD "bucket") $localBucketRoot

          $packages = @("cnb-rs", "cnb-rs-msvc", "cnb-rs-gnu")
          foreach ($package in $packages) {
            scoop install "local-bucket/$package"
            cnb-rs --version
            scoop uninstall $package
          }
